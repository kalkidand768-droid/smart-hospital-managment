<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Hospital Management</title>
<style>
body { font-family: Arial; margin:0; background:#f4f7f9; }
header { background:#005f99; color:#fff; padding:15px 20px; text-align:center; }
nav { display:flex; justify-content:center; background:#005f99; flex-wrap: wrap; }
nav button { background:none; border:none; color:white; padding:15px; cursor:pointer; }
nav button:hover { background:#004466; }
section { display:none; padding:20px; }
.active { display:block; }
.card { background:white; padding:15px; margin:10px 0; border-radius:10px; box-shadow:0 3px 8px rgba(0,0,0,0.1); }
input, select { padding:10px; margin:5px 0; width:100%; box-sizing: border-box; }
button.submit { background:#005f99; color:white; border:none; padding:10px; margin-top:10px; cursor:pointer; border-radius:5px; }
button.submit:hover { background:#004466; }
.dashboard { display:grid; grid-template-columns: repeat(auto-fit,minmax(200px,1fr)); gap:15px; }
.stat { background:#94d2bd; padding:20px; border-radius:10px; text-align:center; font-weight:bold; }
.appointment-today { background:#ffc107; } /* yellow */
.appointment-future { background:#28a745; color:white; } /* green */
.appointment-past { background:#6c757d; color:white; } /* gray */
footer { text-align:center; padding:10px; background:#005f99; color:white; margin-top:20px; }
.alert { padding:10px; background:#28a745; color:white; border-radius:5px; margin-top:10px; }
.error { padding:10px; background:#d9534f; color:white; border-radius:5px; margin-top:10px; }
</style>
</head>
<body>

<header>
<h1>🏥 Smart Hospital Management</h1>
<p>Secure Login • Dashboard • Patients • Doctors • Appointments</p>
</header>

<section id="login" class="active">
<div class="card">
<h2>Login</h2>
<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">
<select id="role">
<option>Admin</option>
<option>Doctor</option>
<option>Patient</option>
</select>
<button class="submit" onclick="login()">Login</button>
<p id="loginMsg"></p>
</div>
</section>

<nav id="mainNav" style="display:none;">
<button onclick="showSection('dashboard')">Dashboard</button>
<button onclick="showSection('patients')">Patients</button>
<button onclick="showSection('doctors')">Doctors</button>
<button onclick="showSection('appointments')">Appointments</button>
<button onclick="resetData()">Reset All Data</button>
<button onclick="logout()">Logout</button>
</nav>

<section id="dashboard">
<div class="dashboard">
<div class="stat" id="totalPatients">Patients: 0</div>
<div class="stat" id="totalDoctors">Doctors: 0</div>
<div class="stat" id="totalAppointments">Appointments: 0</div>
</div>
<div id="appointmentHighlights" style="margin-top:20px;"></div>
</section>

<section id="patients">
<div class="card">
<h2>Add Patient</h2>
<input id="pname" placeholder="Name">
<input id="page" type="number" placeholder="Age">
<input id="pdisease" placeholder="Disease">
<button class="submit" onclick="addPatient()">Add</button>
<p id="ai"></p>
</div>
<input placeholder="Search patient" onkeyup="searchPatient(this.value)">
<div id="patientList"></div>
</section>

<section id="doctors">
<div class="card">
<h2>Add Doctor</h2>
<input id="dname" placeholder="Name">
<input id="dspecial" placeholder="Specialization">
<button class="submit" onclick="addDoctor()">Add</button>
</div>
<div id="doctorList"></div>
</section>

<section id="appointments">
<div class="card">
<h2>Book Appointment</h2>
<select id="apname"></select>
<select id="adname"></select>
<input id="adate" type="date">
<button class="submit" onclick="addAppointment()">Book</button>
</div>
<div id="appointmentList"></div>
</section>

<footer>
<p>© 2026 Smart Hospital Management | Built by Kalkidan</p>
</footer>

<script>
let patients = JSON.parse(localStorage.getItem('patients'))||[];
let doctors = JSON.parse(localStorage.getItem('doctors'))||[];
let appointments = JSON.parse(localStorage.getItem('appointments'))||[];
let idCounter = patients.length;
let currentRole = "";

function save(){
localStorage.setItem('patients',JSON.stringify(patients));
localStorage.setItem('doctors',JSON.stringify(doctors));
localStorage.setItem('appointments',JSON.stringify(appointments));
updateDashboard();
populateDropdowns();
}

function login(){
let user = document.getElementById('username').value;
let pass = document.getElementById('password').value;
let role = document.getElementById('role').value;

if(role === "Admin" && pass === "admin123") currentRole="Admin";
else if(role === "Doctor" && pass === "doctor123") currentRole="Doctor";
else if(role === "Patient" && pass === "patient123") currentRole="Patient";
else { document.getElementById('loginMsg').innerHTML="<span class='error'>❌ Wrong password</span>"; return; }

document.getElementById('login').style.display='none';
document.getElementById('mainNav').style.display='flex';
showSection('dashboard');
applyPermissions();
}

function logout(){ location.reload(); }

function applyPermissions(){
if(currentRole === "Patient"){
document.querySelector("button[onclick=\"showSection('patients')\"]").style.display='none';
document.querySelector("button[onclick=\"showSection('appointments')\"]").style.display='none';
}
if(currentRole === "Doctor"){
document.querySelector("button[onclick=\"showSection('patients')\"]").style.display='none';
}
}

function showSection(id){
document.querySelectorAll('section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
updateDashboard();
renderPatients();
renderDoctors();
renderAppointments();
}

function updateDashboard(){
document.getElementById('totalPatients').innerText="Patients: "+patients.length;
document.getElementById('totalDoctors').innerText="Doctors: "+doctors.length;
document.getElementById('totalAppointments').innerText="Appointments: "+appointments.length;
renderAppointmentHighlights();
}

function renderAppointmentHighlights(){
let container = document.getElementById('appointmentHighlights');
container.innerHTML='';
let today = new Date().toISOString().split('T')[0];
appointments.forEach(a=>{
let div = document.createElement('div');
div.className='card';
if(a.date === today) div.classList.add('appointment-today');
else if(a.date > today) div.classList.add('appointment-future');
else div.classList.add('appointment-past');
div.innerText = `${a.p} with Dr. ${a.d} on ${a.date}`;
container.appendChild(div);
});
}

function aiAdvice(d){
d=d.toLowerCase();
if(d.includes('malaria')) return '⚠ Urgent treatment required';
if(d.includes('cough')) return '💡 Check lungs';
if(d.includes('fever')) return '⚠ Monitor temperature';
return '💡 General check needed';
}

function addPatient(){
if(!pname.value || !page.value || !pdisease.value) { alert("Fill all fields!"); return; }
idCounter++;
let p={id:'P'+idCounter,name:pname.value,age:page.value,disease:pdisease.value};
patients.push(p);
document.getElementById('ai').innerText=aiAdvice(p.disease);
renderPatients();
save();
pname.value=''; page.value=''; pdisease.value='';
}

function renderPatients(list=patients){
let container = document.getElementById('patientList');
container.innerHTML='';
list.forEach(p=>{
let div=document.createElement('div');
div.className='card';
div.innerHTML=`${p.id} | <b>${p.name}</b> (${p.age}) - ${p.disease} <button onclick="deletePatient('${p.id}')">❌</button>`;
container.appendChild(div);
});
populateDropdowns();
}

function deletePatient(id){
if(confirm("Are you sure to delete this patient?")) {
patients=patients.filter(p=>p.id!==id);
renderPatients(); save();
}
}

function searchPatient(val){
let filtered=patients.filter(p=>p.name.toLowerCase().includes(val.toLowerCase()));
renderPatients(filtered);
}

function addDoctor(){
if(!dname.value || !dspecial.value) { alert("Fill all fields!"); return; }
doctors.push({name:dname.value,special:dspecial.value});
renderDoctors(); save();
dname.value=''; dspecial.value='';
}

function renderDoctors(){
let container = document.getElementById('doctorList');
container.innerHTML='';
doctors.forEach(d=>{
let div=document.createElement('div');
div.className='card';
div.innerHTML=`Dr. ${d.name} - ${d.special}`;
container.appendChild(div);
});
populateDropdowns();
}

function addAppointment(){
if(!apname.value || !adname.value || !adate.value) { alert("Select patient, doctor, and date!"); return; }
appointments.push({p:apname.value,d:adname.value,date:adate.value});
renderAppointments(); save();
adate.value='';
}

function renderAppointments(){
let container = document.getElementById('appointmentList');
container.innerHTML='';
let filteredAppointments = currentRole === "Doctor" ? appointments.filter(a=>a.d===currentUserName()) : appointments;
filteredAppointments.forEach((a,index)=>{
let div=document.createElement('div');
div.className='card';
div.innerHTML=`${a.p} with Dr. ${a.d} on ${a.date} <button onclick="deleteAppointment(${index})">❌</button>`;
container.appendChild(div);
});
}

function deleteAppointment(index){
if(confirm("Are you sure to delete this appointment?")) {
appointments.splice(index,1);
renderAppointments(); save();
}
}

function populateDropdowns(){
let pSelect = document.getElementById('apname');
let dSelect = document.getElementById('adname');
pSelect.innerHTML = '';
dSelect.innerHTML = '';
patients.forEach(p => { pSelect.innerHTML += `<option>${p.name}</option>`; });
doctors.forEach(d => { dSelect.innerHTML += `<option>${d.name}</option>`; });
}

function resetData(){
let pass = prompt("Enter master password to reset:");
if(pass === "reset123"){
localStorage.clear();
patients=[]; doctors=[]; appointments=[];
renderPatients(); renderDoctors(); renderAppointments(); updateDashboard();
alert("✅ All data has been reset!");
} else alert("❌ Wrong password!");
}

function currentUserName(){ return document.getElementById('username').value; }

// Initial render
renderPatients(); renderDoctors(); renderAppointments(); updateDashboard();
populateDropdowns();
</script>

</body>
</html>
